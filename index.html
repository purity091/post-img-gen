
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استوديو المستثمر الذكي - Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-main: 'IBM Plex Sans Arabic', sans-serif;
      }
      body {
        font-family: var(--font-main);
        background-color: #f8f9fc;
        color: #0f172a;
        margin: 0;
        overflow: hidden;
      }
      .card-shadow {
        box-shadow: 0 40px 80px -15px rgba(15, 23, 42, 0.15);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .bg-animated {
        background: linear-gradient(-45deg, #f8f9fc, #f1f5f9, #eff6ff, #f8f9fc);
        background-size: 400% 400%;
        animation: gradient-shift 12s ease-infinite;
      }
      /* Ensure fonts stick in exported content */
      #printable-card * {
        font-family: var(--font-main) !important;
      }
      input[type=range]::-webkit-slider-thumb {
        border: 4px solid #ffffff;
        height: 18px;
        width: 18px;
        border-radius: 50%;
        background: #4f46e5;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        margin-top: -6px;
        appearance: none;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "html-to-image": "https://esm.sh/html-to-image@^1.11.11"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-animated">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
